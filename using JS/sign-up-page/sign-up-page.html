<!DOCTYPE html>
<html>
    <head>
        <title>Sign Up</title>

        <link rel="stylesheet" href="sign-up-page.css">

        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&family=Roboto:ital@0;1&display=swap" rel="stylesheet">

    </head>

    <body>
        <div id="sign-up-box">
            <h1 id="main-heading">Sign Up</h1>
            <h3 id="sub-heading">Create A New Account</h3>

            <div id="name-box">
                <input id="first-name-box" placeholder="First Name">
                <input id="last-name-box" placeholder="Last Name">
            </div>

            <input id="email-box" placeholder="Email">

            <input id="username-box" placeholder="Username">
            <input id="password-box" placeholder="Password">

            <button id="sign-up-btn" onclick="signUp()">SIGN UP</button>

            
        </div>

        <script src="sign-up-page.js"></script>
    </body>
</html>
