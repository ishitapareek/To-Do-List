<!DOCTYPE html>
<html>
    <head>
        <title>Forgot Password?</title>

        <link rel="stylesheet" href="forgot-page.css">

        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&family=Roboto:ital@0;1&display=swap" rel="stylesheet">

    </head>

    <body>
        <div id="main-box">

            <span id="new-details">
                <h1 id="heading">Forgot Password?</h1>
                <input id="username-box" placeholder="Enter your username">
                <input id="new-password-box" placeholder="Enter new password">
            </span>

            <button id="change-btn" onclick="changePassword()">CHANGE PASSWORD</button>

            <hr id="line-break">

            <p>Not a user? <a href="../sign-up-page/sign-up-page.html">Sign up now</a></p>
            
        </div>

        <script src="forgot-page.js"></script>
    </body>
</html>
