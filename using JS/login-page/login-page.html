<!DOCTYPE html>
<html>
    <head>
        <title>Login</title>

        <link rel="stylesheet" href="login-page.css">

        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&family=Roboto:ital@0;1&display=swap" rel="stylesheet">

    </head>

    <body>
        <div id="login-box">

            <span id="login-details">
                <h1 id="heading">Login</h1>
                <input id="username-box" placeholder="Username">
                <input id="password-box" placeholder="Password" type="password">
            </span>

            <button id="login-btn" onclick="Login()">LOG IN</button>

            <p><a href="../forgot-password-page/forgot-page.html">Forgot Password?</a></p>

            <hr id="line-break">

            <p>Not a user? <a href="../sign-up-page/sign-up-page.html">Sign up now</a></p>
            
        </div>

        <script src="login-page.js"></script>
    </body>
</html>
