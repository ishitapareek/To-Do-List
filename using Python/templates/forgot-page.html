<!DOCTYPE html>
<html>
    <head>
        <title>Forgot Password?</title>
        <link rel="stylesheet" href="{{ url_for('static', filename='forgot-page.css') }}">
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Montserrat&display=swap" rel="stylesheet">
    </head>

    <body>
        <div id="main-box">
            <form method="POST">
            {% if message %}
                {% if 'changed' in message %}
                    <p style="margin-top: 15px; color: green; font-weight: 500;">
                {% else %}
                    <p style="margin-top: 15px; color: red; font-weight: 500;">
                {% endif %}
                
                {{ message|safe }}</p>
            {% endif %}


                <span id="new-details">
                    <h1 id="heading">Forgot Password?</h1>
                    <input id="username-box" name="username" placeholder="Enter your username" required>
                    <input id="new-password-box" name="new_password" placeholder="Enter new password" required>
                </span>

                <button id="change-btn" type="submit">CHANGE PASSWORD</button>
            </form>

            <hr id="line-break">
            <p>Not a user? <a href="{{ url_for('signup') }}">Sign up now</a></p>
        </div>
    </body>
</html>
